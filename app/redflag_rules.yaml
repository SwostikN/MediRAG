# Week 6 Stage 0 red-flag rules. See docs/IMPROVEMENTS.md §4.2.
#
# Hand-authored deterministic triggers. The LLM never sees a query when a
# rule fires. We bias toward false positives — a panic-attack query that
# gets an emergency banner is recoverable; a missed MI is not.
#
# Trigger DSL:
#   all_of: [<cond>, ...]   all sub-conditions must match
#   any_of: [<cond>, ...]   at least one sub-condition must match
#   <cond> is either a string (case-insensitive substring match on the
#     user message) or a nested dict with all_of / any_of.
#
# First match wins. Order rules from most-specific to most-general so
# (pregnant + seizure) fires pregnancy_seizure before generic seizure_active.

rules:
  - id: chest_pain_cardiac
    category: cardiac
    response_template: redflag_cardiac_np
    triggers:
      all_of:
        - any_of:
            - "chest pain"
            - "chest pressure"
            - "chest tightness"
            - "crushing chest"
            - "chest is hurting"
            - "heavy chest"
            - "chest feels heavy"
            - "pain in my chest"
            - "pain in chest"
            - "pain in his chest"
            - "pain in her chest"
        - any_of:
            - "left arm"
            - "down my arm"
            - "down his arm"
            - "down her arm"
            - "into my arm"
            - "into his arm"
            - "arm feels weird"
            - "jaw pain"
            - "into my jaw"
            - "into the jaw"
            - "shortness of breath"
            - "short of breath"
            - "can't breathe"
            - "sweating"
