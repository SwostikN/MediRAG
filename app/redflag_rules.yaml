# Week 6 Stage 0 red-flag rules. See docs/IMPROVEMENTS.md §4.2.
#
# Hand-authored deterministic triggers. The LLM never sees a query when a
# rule fires. We bias toward false positives — a panic-attack query that
# gets an emergency banner is recoverable; a missed MI is not.
#
# Trigger DSL:
#   all_of: [<cond>, ...]   all sub-conditions must match
#   any_of: [<cond>, ...]   at least one sub-condition must match
#   <cond> is either a string (case-insensitive substring match on the
#     user message) or a nested dict with all_of / any_of.
#
# First match wins. Order rules from most-specific to most-general so
# (pregnant + seizure) fires pregnancy_seizure before generic seizure_active.
#
# -------------------------------------------------------------------
# Source-citation methodology (for the reviewing clinician)
# -------------------------------------------------------------------
# Every rule carries a `# source:` comment listing the primary clinical
# authority the trigger set was drawn from. Citations are pointer-level
# (e.g. "NHS 111 'Chest pain' pathway") rather than verbatim quotations
# with volume / page numbers — please verify against the current version
# of the cited guideline before signing off.
#
# Sources used across the ruleset:
#   - NHS 111 online triage pathways (UK public lay-facing triage)
#   - WHO IMCI general danger signs (paediatric <5)
#   - WHO guidelines for management of snakebites (SE Asia region)
#   - NICE clinical guidelines (CG102, CG107, CG134, CG141, CG176, NG28, NG88)
#   - ACEP / ESI Emergency Severity Index (triage framework)
#   - AAP, AAO, AUA, ABA specialty-society emergency criteria
#   - Sepsis-3 consensus (qSOFA) / UK Sepsis Trust
#   - ILAE status epilepticus definition; ERC / AHA resuscitation algorithms
#   - WAO anaphylaxis diagnostic criteria
#   - Columbia Suicide Severity Rating Scale (C-SSRS)
#   - CDC heat-related-illness guidance
#
# A rule without a defensible source is a rule that should be removed.

rules:
  # source: NHS 111 "Chest pain" triage pathway + classic ACS presentation
  #   — chest discomfort + ≥1 associated sign (arm/jaw radiation, dyspnoea,
  #   diaphoresis, nausea). "Crushing" is the most specific descriptor.
  - id: chest_pain_cardiac
    category: cardiac
    response_template: redflag_cardiac_np
    triggers:
      all_of:
        - any_of:
            - "chest pain"
            - "chest pressure"
            - "chest tightness"
            - "crushing chest"
            - "chest is crushing"
            - "chest is hurting"
            - "heavy chest"
            - "chest feels heavy"
            - "pain in my chest"
            - "pain in chest"
            - "pain in his chest"
            - "pain in her chest"
        - any_of:
            - "left arm"
            - "down my arm"
            - "down his arm"
            - "down her arm"
            - "into my arm"
            - "into his arm"
            - "arm feels weird"
            - "arm tingles"
            - "arm tingling"
            - "arm is tingling"
            - "tingling in my arm"
            - "tingling in his arm"
            - "tingling in her arm"
            - "arm feels numb"
            - "arm is numb"
            - "jaw pain"
            - "into my jaw"
            - "into the jaw"
            - "shortness of breath"
            - "short of breath"
            - "can't breathe"
            - "sweating"
            - "cold sweat"
            - "clammy"
            - "nausea"
            - "feel sick"
            - "feels sick"
            - "vomiting"

  # source: FAST / BE-FAST stroke screen (American Stroke Assoc., UK Stroke
  #   Assoc.) — any single FAST-positive sign (face droop / arm weakness /
  #   speech disturbance / sudden confusion / sudden vision loss) is a red flag.
  - id: stroke_signs
    category: neurological
    response_template: redflag_stroke_np
    triggers:
      any_of:
        - "face drooping"
        - "face is drooping"
        - "face is pulling"
        - "mouth is pulling to one side"
        - "mouth pulling to one side"
        - "one side of the face"
        - "mouth drooping"
        - "slurred speech"
        - "speech is slurred"
        - "can't speak properly"
        - "cannot speak properly"
        - "can't speak"
        - "cannot speak"
        - "difficulty speaking"
        - "sudden weakness"
        - "sudden numbness"
        - "numb on one side"
        - "one side is numb"
        - "one side numb"
        - "can't move his right arm"
        - "can't move her right arm"
        - "can't move my right arm"
        - "can't move his left arm"
        - "can't move her left arm"
        - "can't move my left arm"
        - "weakness on one side"
        - "arm drift"
        - "sudden confusion"
        - "sudden trouble seeing"

  # source: NICE CG107 "Hypertension in pregnancy" + WHO MCEE severe-PE criteria
  #   — preeclampsia warning features: severe headache + visual disturbance +
  #   facial / hand oedema in pregnancy.
  - id: preeclampsia_signs
    category: obstetric
    response_template: redflag_obstetric_np
    triggers:
      all_of:
        - any_of:
            - "pregnant"
            - "weeks pregnant"
            - "third trimester"
        - any_of:
            - "severe headache"
            - "terrible headache"
            - "worst headache"
            - "bad headache"
            - "blurred vision"
            - "vision is blurry"
            - "vision is blurred"
            - "can't see properly"
            - "swelling in my face"
            - "swelling in his face"
            - "swelling in her face"
            - "swelling in face"
            - "face is swollen"
            - "swollen face"

  # source: WHO antepartum/postpartum haemorrhage guidance + RCOG "Antepartum
  #   haemorrhage" Green-top — heavy bleeding in pregnancy is a maternal
  #   emergency at any gestation.
  - id: obstetric_bleeding
    category: obstetric
    response_template: redflag_obstetric_np
    triggers:
      all_of:
        - any_of:
            - "pregnant"
            - "weeks pregnant"
            - "third trimester"
        - any_of:
            - "heavy bleeding"
            - "lots of blood"
            - "bleeding a lot"
            - "soaking through"
            - "passing clots"
            - "passing big clots"
            - "clots of blood"
            - "gushing blood"

  # source: NICE CG107 eclampsia criteria + WHO MCEE
  #   — any convulsion in pregnancy is eclampsia until proven otherwise.
  - id: pregnancy_seizure
    category: obstetric
    response_template: redflag_obstetric_np
    triggers:
      all_of:
        - any_of:
            - "pregnant"
            - "weeks pregnant"
            - "third trimester"
        - any_of:
            - "seizure"
            - "convulsion"
            - "convulsing"
            - "had a fit"
            - "having fits"

  # source: NICE NG88 "Heavy menstrual bleeding" + NHS 111 heavy periods pathway
  #   — soaking a pad / tampon every hour is the recognised red-flag threshold.
  - id: heavy_vaginal_bleeding
    category: gynecological
    response_template: redflag_obstetric_np
    triggers:
      any_of:
        - "soaking through a pad every hour"
        - "soaking through pads every hour"
        - "soaking a pad an hour"
        - "soaking through a pad an hour"
        - "passing huge clots"
        - "menstrual bleeding won't stop"
        - "period bleeding won't stop"

  # source: World Allergy Organization (WAO) anaphylaxis diagnostic criteria +
  #   NICE CG134 — airway / mucosal involvement (throat, tongue, lip swelling)
  #   with respiratory compromise or a known exposure trigger is diagnostic.
  - id: anaphylaxis
    category: allergic
    response_template: redflag_anaphylaxis_np
    triggers:
      all_of:
        - any_of:
            - "throat swelling"
            - "throat is swelling"
            - "throat is closing"
            - "throat closing"
            - "throat tightening"
            - "tongue swelling"
            - "tongue is swelling"
            - "tongue is swollen"
            - "tongue swollen"
            - "tongue swelling up"
            - "lips swelling"
            - "lips are swelling"
            - "lips swollen"
            - "lips are swollen"
            - "lip swelling"
            - "hives all over"
            - "covered in hives"
        - any_of:
            - "can't breathe"
            - "hard to breathe"
            - "difficulty breathing"
            - "trouble breathing"
            - "wheezing"
            - "after eating"
            - "after a sting"
            - "after a bee"
            - "after a bee sting"
            - "stung by a bee"
            - "after injection"
            - "after the medicine"
            - "after the antibiotic"
            - "allergic reaction"

  # source: WAO anaphylaxis criteria (lower-threshold subset) + NICE CG134
  #   — facial / lip swelling + any respiratory compromise warrants anaphylaxis
  #   treatment even without explicit exposure history.
  - id: severe_allergic_reaction
    category: allergic
    response_template: redflag_anaphylaxis_np
    triggers:
      all_of:
        - any_of:
            - "face is swelling"
            - "face swelling up"
            - "face swelling"
            - "swelling in my face"
            - "swollen lips"
            - "lips swelling"
            - "lips are swelling"
        - any_of:
            - "difficulty breathing"
            - "trouble breathing"
            - "can't breathe"
            - "wheezing"
            - "throat tightening"

  # source: Stop the Bleed (ACS-COT) + ATLS haemorrhage-control principles
  #   — uncontrolled bleeding, spurting / pulsing blood, or soaked-through
  #   dressing is class II+ haemorrhage requiring emergency care.
  - id: severe_bleeding
    category: trauma
    response_template: redflag_trauma_np
    triggers:
      any_of:
        - "bleeding won't stop"
        - "bleeding that won't stop"
        - "can't stop the bleeding"
        - "blood is spurting"
        - "blood spurting"
        - "pulsing blood"
        - "lost a lot of blood"
        - "losing a lot of blood"
        - "soaked through bandage"
        - "soaked the bandage"
        - "gushing blood from"

  # source: WHO seizure first aid + ILAE status-epilepticus definition
  #   — any seizure lasting >5 min (or unwitnessed duration) is status
  #   epilepticus and a medical emergency.
  - id: seizure_active
    category: neurological
    response_template: redflag_seizure_np
    triggers:
      any_of:
        - "having a seizure"
        - "is seizing"
        - "actively seizing"
        - "convulsing right now"
        - "is convulsing"
        - "seizure right now"

  # source: WHO "Preventing suicide: a global imperative" + Columbia Suicide
  #   Severity Rating Scale (C-SSRS) tiers 4–5 — active ideation with plan,
  #   means, or stated intent is a psychiatric emergency.
  - id: suicidal_active
    category: mental-health
    response_template: redflag_mental_health_np
    triggers:
      any_of:
        - "want to kill myself"
        - "going to kill myself"
        - "end my life"
        - "ending my life"
        - "planning to end my life"
        - "i want to die"
        - "suicide plan"
        - "plan to kill myself"
        - "have pills ready"
        - "no reason to live"
        - "better off dead"
        - "everyone would be better off dead"
        - "world would be better without me"
        - "everyone would be better without me"
        - "they would be better without me"
        - "thinking about how i'd do it"
        - "thinking about how i would do it"
        - "thinking about how to do it"
        - "think about how i'd do it"
        - "think about how i would do it"
        - "started thinking about ending"
        - "started thinking about dying"
        - "started thinking the world would"

  # source: psychiatric-emergency literature — command auditory hallucinations
  #   directing harm to self or others carry imminent-danger risk; treat as
  #   mental-health emergency regardless of diagnosis.
  - id: psychosis_harm
    category: mental-health
    response_template: redflag_mental_health_np
    triggers:
      any_of:
        - "voices telling me to hurt"
        - "voices are telling me to hurt"
        - "voices tell me to hurt"
        - "voices telling me to kill"
        - "voices are telling me to kill"
        - "voices tell me to kill"
        - "going to hurt someone"
        - "plan to hurt someone"
        - "want to kill him"
        - "want to kill her"

  # source: NICE CG176 "Head injury" + Canadian CT Head Rule
  #   — LOC, repeated vomiting, amnesia, seizure, CSF leak (clear fluid from
  #   nose / ear), or bleeding from ear after head trauma = major red flag
  #   for intracranial injury.
  - id: head_injury_serious
    category: trauma
    response_template: redflag_trauma_np
    triggers:
      all_of:
        - any_of:
            - "hit his head"
            - "hit her head"
            - "hit my head"
            - "head injury"
            - "fell and hit"
            - "head trauma"
            - "banged my head"
            - "motorbike accident"
        - any_of:
            - "unconscious"
            - "passed out"
            - "lost consciousness"
            - "vomiting repeatedly"
            - "throwing up repeatedly"
            - "vomited multiple"
            - "vomited three"
            - "vomited several"
            - "keeps vomiting"
            - "confused"
            - "can't stay awake"
            - "won't wake up"
            - "seizure"
            - "bleeding from the ear"
            - "bleeding from his ear"
            - "bleeding from her ear"
            - "clear fluid from nose"

  # source: NHS 111 "Breathing difficulty" pathway + ERC / AHA resuscitation
  #   triggers — central cyanosis, agonal breathing, or stopped breathing
  #   requires immediate action.
  - id: difficulty_breathing_severe
    category: respiratory
    response_template: redflag_respiratory_np
    triggers:
      any_of:
        - "can't breathe at all"
        - "can't catch my breath"
        - "gasping for air"
        - "gasping for breath"
        - "turning blue"
        - "lips are blue"
        - "lips turning blue"
        - "face is blue"
        - "stopped breathing"
        - "struggling to breathe"

  # source: Red Cross / ERC / AHA choking algorithm
  #   — foreign-body airway obstruction with inability to clear is a
  #   time-critical emergency.
  - id: choking
    category: respiratory
    response_template: redflag_respiratory_np
    triggers:
      any_of:
        - "choking on"
        - "is choking"
        - "he is choking"
        - "she is choking"
        - "something stuck in throat"
        - "something stuck in his throat"
        - "something stuck in her throat"
        - "food stuck in"
        - "can't cough it out"
        - "can't get it out"

  # source: AAP "Fever in infants <90 days" + WHO IMCI general danger signs
  #   — any temperature ≥38°C in an infant under 3 months requires ED-level
  #   evaluation; serious bacterial infection must be excluded. Age triggers
  #   cover every week up to 12 weeks (= 3 months) to avoid coverage holes
  #   like "10 weeks old" or "2 weeks old" slipping through to the lethargy
  #   rule which requires additional danger signs.
  - id: infant_fever_under3mo
    category: pediatric
    response_template: redflag_pediatric_np
    triggers:
      all_of:
        - any_of:
            - "newborn"
            - "under 3 months"
            - "under three months"
            - "1 month old"
            - "one month old"
            - "2 months old"
            - "two months old"
            - "1 week old"
            - "2 weeks old"
            - "3 weeks old"
            - "4 weeks old"
            - "5 weeks old"
            - "6 weeks old"
            - "7 weeks old"
            - "8 weeks old"
            - "9 weeks old"
            - "10 weeks old"
            - "11 weeks old"
            - "12 weeks old"
            - "few weeks old"
        - any_of:
            - "fever"
            - "high temperature"
            - "high temp"
            - "very hot"
            - "burning up"
            - "38"
            - "39"
            - "40"

  # source: WHO IMCI general danger signs — unable to drink / breastfeed,
  #   lethargy, unresponsiveness, or convulsions combined with fever is a
  #   major paediatric red flag.
  - id: infant_fever_lethargy
    category: pediatric
    response_template: redflag_pediatric_np
    triggers:
      all_of:
        - any_of:
            - "infant"
            - "baby"
            - "month-old"
            - "month old"
            - "months old"
            - "months-old"
        - any_of:
            - "fever"
            - "high temperature"
            - "high temp"
            - "burning up"
            - "very hot"
            - "39"
            - "40"
        - any_of:
            - "sleepy"
            - "very sleepy"
            - "lethargic"
            - "won't wake"
            - "can't wake"
            - "won't feed"
            - "not feeding"
            - "refusing to feed"
            - "limp"
            - "floppy"
            - "unresponsive"
            - "barely responsive"

  # source: WHO IMCI respiratory danger signs — central cyanosis (blue lips,
  #   perioral cyanosis) indicates hypoxaemia and needs immediate care.
  - id: infant_blue_lips
    category: pediatric
    response_template: redflag_pediatric_np
    triggers:
      all_of:
        - any_of:
            - "baby"
            - "infant"
            - "newborn"
            - "month old"
            - "month-old"
            - "months old"
            - "months-old"
        - any_of:
            - "blue lips"
            - "lips are blue"
            - "blue around the mouth"
            - "blue face"
            - "turning blue"

  # source: WHO IMCI convulsion danger sign — seizure in a child under 5
  #   (or any paediatric first seizure) is a paediatric emergency.
  - id: infant_seizure
    category: pediatric
    response_template: redflag_pediatric_np
    triggers:
      all_of:
        - any_of:
            - "baby"
            - "infant"
            - "child"
            - "toddler"
            - "month-old"
            - "month old"
            - "months old"
            - "months-old"
            - "year-old"
            - "year old"
            - "years-old"
            - "yr old"
        - any_of:
            - "had a seizure"
            - "having a seizure"
            - "is convulsing"
            - "convulsing"
            - "fitting"
            - "had a fit"

  # source: NICE CG102 "Meningitis (bacterial) and meningococcal disease"
  #   — classic triad (fever + neck stiffness + altered mental status) plus
  #   non-blanching purpuric rash and photophobia.
  - id: meningitis_signs
    category: infectious
    response_template: redflag_infectious_np
    triggers:
      all_of:
        - any_of:
            - "stiff neck"
            - "neck is stiff"
            - "neck is so stiff"
            - "neck is very stiff"
            - "can't bend neck"
            - "can't bend my neck"
            - "can't bend his neck"
            - "can't bend her neck"
        - any_of:
            - "fever"
            - "high temperature"
            - "high temp"
            - "severe headache"
            - "terrible headache"
            - "worst headache"
            - "rash that won't blanch"
            - "purpuric rash"
            - "confused"
            - "light hurts"
            - "sensitive to light"

  # source: Sepsis-3 consensus (qSOFA: AMS, RR ≥22, SBP ≤100) + UK Sepsis
  #   Trust "Symptoms" campaign — infection with AMS or haemodynamic
  #   compromise warrants immediate sepsis workup.
  - id: sepsis_signs
    category: infectious
    response_template: redflag_sepsis_np
    triggers:
      all_of:
        - any_of:
            - "fever"
            - "high temperature"
            - "high temp"
            - "shivering uncontrollably"
            - "chills and shaking"
        - any_of:
            - "confused"
            - "disoriented"
            - "can't stay awake"
            - "very low blood pressure"
            - "heart racing"
            - "fast heart"
            - "very sleepy"
            - "barely responsive"
            - "cold hands and feet"
            - "hands are cold"
            - "hands and feet are cold"

  # source: NICE NG28 "Type 2 diabetes in adults" + ADA "Standards of Care"
  #   — Kussmaul breathing + fruity (ketotic) breath in known diabetes
  #   suggests DKA; altered consciousness in a diabetic suggests severe
  #   hypoglycaemia.
  - id: diabetic_emergency
    category: endocrine
    response_template: redflag_diabetic_np
    triggers:
      all_of:
        - any_of:
            - "diabetic"
            - "diabetes"
            - "on insulin"
        - any_of:
            - "passed out"
            - "unconscious"
            - "very confused"
            - "won't wake up"
            - "can't wake him"
            - "can't wake her"
            - "can't wake them"
            - "blood sugar very low"
            - "blood sugar is too low"
            - "sugar dropped very low"
            - "sugar very low"
            - "fruity breath"
            - "breath smells fruity"
            - "smells fruity"
            - "heavy breathing and fruity"
            - "deep heavy breathing"

  # source: ISPAD / ADA DKA consensus + NICE NG17 — DKA can present in
  #   *undiagnosed* diabetes (especially new-onset T1DM in children/young
  #   adults) and the diabetic_emergency rule misses these cases because
  #   it requires a known-diabetes keyword. Cardinal triad: polyuria +
  #   polydipsia + Kussmaul (deep-fast) breathing, often with vomiting or
  #   fruity (ketotic) breath. Fires on polyuria/polydipsia PLUS one
  #   metabolic/respiratory cardinal — tight enough to be specific.
  - id: dka_classic
    category: endocrine
    response_template: redflag_dka_np
    triggers:
      all_of:
        - any_of:
            - "peeing constantly"
            - "peeing a lot"
            - "urinating constantly"
            - "urinating a lot"
            - "urinating all the time"
            - "peeing all the time"
            - "going to the toilet constantly"
            - "constantly thirsty"
            - "very thirsty"
            - "extremely thirsty"
            - "thirsty all the time"
            - "can't stop drinking water"
            - "cannot stop drinking water"
            - "drinking water constantly"
            - "drinking so much water"
            - "drinking a lot of water"
            - "polyuria"
            - "polydipsia"
        - any_of:
            - "deep heavy breathing"
            - "deep rapid breathing"
            - "deep fast breathing"
            - "rapid deep breathing"
            - "fast deep breathing"
            - "breathing deeply and quickly"
            - "breathing deeply and fast"
            - "breathing feels deep and fast"
            - "kussmaul"
            - "fruity breath"
            - "breath smells fruity"
            - "smells fruity"
            - "acetone breath"
            - "breath smells of acetone"

  # source: AUA / EAU testicular torsion guideline
  #   — sudden severe testicular pain with swelling. Testicle salvageable
  #   within roughly 6 hours; time-critical surgical emergency.
  - id: testicular_torsion
    category: urological
    response_template: redflag_urological_np
    triggers:
      all_of:
        - any_of:
            - "testicle"
            - "testicular"
            - "scrotum"
        - any_of:
            - "sudden severe pain"
            - "very sudden pain"
            - "extremely painful"
            - "swollen and painful"
            - "very painful and swollen"

  # source: AAO "Ophthalmology emergencies" guidance
  #   — chemical splash, penetrating trauma, or sudden vision loss is a
  #   sight-threatening emergency requiring immediate irrigation / referral.
  - id: eye_injury_serious
    category: trauma
    response_template: redflag_trauma_np
    triggers:
      any_of:
        - "chemical in my eye"
        - "chemical in his eye"
        - "chemical in her eye"
        - "bleach in my eye"
        - "bleach in his eye"
        - "bleach in her eye"
        - "acid in my eye"
        - "suddenly can't see"
        - "lost vision suddenly"
        - "sudden vision loss"
        - "something pierced my eye"

  # source: American Burn Association referral criteria + NHS 111 burns pathway
  #   — facial, electrical, chemical, or large burns require burn-unit
  #   evaluation regardless of depth estimate.
  - id: burn_serious
    category: trauma
    response_template: redflag_burn_np
    triggers:
      any_of:
        - "large burn"
        - "big burn"
        - "burned my face"
        - "burn on my face"
        - "burn on his face"
        - "burn on her face"
        - "electrical burn"
        - "electric shock burn"
        - "chemical burn"

  # source: WHO "Guidelines for poison control" + IPCS INTOX database
  #   — ingestion of caustics / pesticides (paraquat, organophosphates) /
  #   overdose all require ED-level care. Nepal-relevant note: paraquat and
  #   OP self-poisoning are leading rural self-harm causes.
  - id: poisoning
    category: toxicology
    response_template: redflag_poisoning_np
    triggers:
      any_of:
        - "swallowed poison"
        - "drank bleach"
        - "drank kerosene"
        - "drank pesticide"
        - "drank insecticide"
        - "drank paraquat"
        - "swallowed pills"
        - "swallowed some pills"
        - "swallowed a handful of pills"
        - "swallowed a lot of pills"
        - "swallowed tablets"
        - "swallowed some tablets"
        - "swallowed medicine"
        - "swallowed some medicine"
        - "took too many pills"
        - "took the whole bottle"
        - "took a whole bottle"
